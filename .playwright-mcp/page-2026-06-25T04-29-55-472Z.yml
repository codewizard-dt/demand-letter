          - generic [ref=e101]:
            - paragraph [ref=e102]: Legal proceedings can span years, and each case can have dozens of transcripts. You can spend hours or days reading transcripts and over-inclusive summaries.
            - paragraph [ref=e103]: With Transcript Genius that time is reduced to minutes. Create dynamic summaries customized by the length, level of detail, and focus. Simply provide Transcript Genius with the topics and details to focus on, resulting in a summary that covers the specific areas you want a refresher on. Best of all insights comes with linked page line citations, allowing you to instantly verify information against the original transcript.
