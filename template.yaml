AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Demand Letter Generator — SAM application

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Ref Stage
        DATABASE_URL: !Sub '{{resolve:ssm:/${Stage}/demand-letter/db/url}}'
        CORS_ORIGINS: !Sub '${WebAppOrigin},${WebAppOrigin2}'
  Api:
    BinaryMediaTypes:
      - multipart/form-data
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/octet-stream
    Cors:
      AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Caller-Role'"
      AllowOrigin: "'*'"

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy RDS into

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for RDS subnet group

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for RDS subnet group

  WebAppOrigin:
    Type: String
    Default: 'http://localhost:5173'
    Description: Primary allowed CORS origin for the web frontend

  WebAppOrigin2:
    Type: String
    Default: 'http://localhost:5174'
    Description: Secondary allowed CORS origin (e.g. alternate Vite dev-server port)

  TextractCompletionTopicArn:
    Type: String
    Description: ARN of the SNS topic for Textract job completion notifications
    Default: ''

Resources:
  # Placeholder — Phase 1 resources (S3, RDS) added by TASK-003, TASK-004
  # API Gateway and Lambda resources added in Phase 3

  DemandLetterKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for RDS encryption — Demand Letter Generator
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  DemandLetterKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${Stage}-demand-letter-rds'
      TargetKeyId: !Ref DemandLetterKmsKey

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL access - Demand Letter Generator
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0  # dev only — lock down for production

  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for Demand Letter RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DemandLetterDb:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub '${Stage}-demand-letter-db'
      DBInstanceClass: db.t4g.micro
      Engine: postgres
      EngineVersion: '16.3'
      AllocatedStorage: '20'
      StorageType: gp3
      StorageEncrypted: true
      KmsKeyId: !Ref DemandLetterKmsKey
      MasterUsername: !Sub '{{resolve:ssm:/${Stage}/demand-letter/db/username}}'
      MasterUserPassword: !Sub '{{resolve:ssm-secure:/${Stage}/demand-letter/db/password:1}}'
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: true  # dev only
      EnablePerformanceInsights: true

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref DemandLetterKmsKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins:
              - !Ref WebAppOrigin
              - !Ref WebAppOrigin2
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: MoveOutputsToIntelligentTiering
            Status: Enabled
            Prefix: output/
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING

  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub '${DocumentsBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  DbLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${Stage}-demand-letter-db'
      ContentUri: packages/db/
      CompatibleRuntimes:
        - nodejs24.x
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: nodejs24.x

  GetJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs.handler
      Runtime: nodejs24.x
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsApi:
          Type: Api
          Properties:
            Path: /jobs
            Method: get
      Policies:
        - AWSLambdaBasicExecutionRole

  PostJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs.handler
      Runtime: nodejs24.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsApi:
          Type: Api
          Properties:
            Path: /jobs
            Method: post

  PostJobsFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-files.handler
      Runtime: nodejs24.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsFilesApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/files
            Method: post
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket

  GetAdminLlmCostsFunction:
