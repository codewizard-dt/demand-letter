AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Demand Letter Generator — SAM application

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Ref Stage
        DATABASE_URL: !Sub '{{resolve:ssm:/${Stage}/demand-letter/db/url}}'
  Api:
    BinaryMediaTypes:
      - multipart/form-data
    Cors:
      AllowMethods: "'GET,POST,PATCH,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: !Sub "'${WebAppOrigin}'"

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy RDS into

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for RDS subnet group

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for RDS subnet group

  WebAppOrigin:
    Type: String
    Default: 'http://localhost:5173'
    Description: Allowed CORS origin for S3 pre-signed URL uploads

  TextractCompletionTopicArn:
    Type: String
    Description: ARN of the SNS topic for Textract job completion notifications
    Default: ''

Resources:
  # Placeholder — Phase 1 resources (S3, RDS) added by TASK-003, TASK-004
  # API Gateway and Lambda resources added in Phase 3

  DemandLetterKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK for RDS encryption — Demand Letter Generator
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  DemandLetterKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${Stage}-demand-letter-rds'
      TargetKeyId: !Ref DemandLetterKmsKey

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL access - Demand Letter Generator
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0  # dev only — lock down for production

  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for Demand Letter RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DemandLetterDb:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub '${Stage}-demand-letter-db'
      DBInstanceClass: db.t4g.micro
      Engine: postgres
      EngineVersion: '16.3'
      AllocatedStorage: '20'
      StorageType: gp3
      StorageEncrypted: true
      KmsKeyId: !Ref DemandLetterKmsKey
      MasterUsername: !Sub '{{resolve:ssm:/${Stage}/demand-letter/db/username}}'
      MasterUserPassword: !Sub '{{resolve:ssm-secure:/${Stage}/demand-letter/db/password:1}}'
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: true  # dev only
      EnablePerformanceInsights: true

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref DemandLetterKmsKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: [!Ref WebAppOrigin]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: MoveOutputsToIntelligentTiering
            Status: Enabled
            Prefix: output/
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING

  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub '${DocumentsBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  DbLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${Stage}-demand-letter-db'
      ContentUri: packages/db/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: nodejs20.x

  GetJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs.handler
      Runtime: nodejs20.x
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsApi:
          Type: Api
          Properties:
            Path: /jobs
            Method: get
      Policies:
        - AWSLambdaBasicExecutionRole

  PostJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsApi:
          Type: Api
          Properties:
            Path: /jobs
            Method: post

  PostJobsFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-files.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsFilesApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/files
            Method: post
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket

  GetAdminLlmCostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-admin-llm-costs.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        GetAdminLlmCostsApi:
          Type: Api
          Properties:
            Path: /admin/llm-costs
            Method: get

  PostJobsGenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-generate.handler
      Runtime: nodejs20.x
      Timeout: 300
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsGenerateApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/generate
            Method: post
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          BEDROCK_MODEL_ID: !Sub '{{resolve:ssm:/${Stage}/demand-letter/bedrock-model-id}}'

  GetJobsOutputFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs-output.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsOutputApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/output
            Method: get

  GetJobsTemplateZonesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs-template-zones.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsTemplateZonesApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/templates/{templateId}/zones
            Method: get

  PatchJobsTemplateZonesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: patch-jobs-template-zones.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PatchJobsTemplateZonesApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/templates/{templateId}/zones
            Method: patch

  PostJobsTemplatesClassifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-templates-classify.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsTemplatesClassifyApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/templates/{templateId}/classify
            Method: post
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Sub '{{resolve:ssm:/${Stage}/demand-letter/bedrock-model-id}}'

  PostJobsTemplatesInjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-templates-inject.handler
      Runtime: nodejs20.x
      Policies:
        - S3CrudPolicy:
            BucketName: !Sub '${Stage}-demand-letter-docs-${AWS::AccountId}'
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsTemplatesInjectApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/templates/{templateId}/inject
            Method: post
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket

  GetJobsTemplateSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs-template-slots.handler
      Runtime: nodejs20.x
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsTemplateSlotsApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/templates/{templateId}/slots
            Method: get

  PostJobsDocumentsIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-documents-ingest.handler
      Runtime: nodejs20.x
      Timeout: 300
      MemorySize: 512
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsDocumentsIngestApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/documents/ingest
            Method: post
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt DocumentsBucket.Arn
                - !Sub '${DocumentsBucket.Arn}/*'
            - Effect: Allow
              Action:
                - textract:StartDocumentAnalysis
              Resource: '*'
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket

  SnsTextractCompletionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: sns-textract-completion.handler
      Runtime: nodejs20.x
      Timeout: 300
      MemorySize: 512
      Layers:
        - !Ref DbLayer
      Events:
        TextractCompletionSns:
          Type: SNS
          Properties:
            Topic: !Ref TextractCompletionTopicArn
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - textract:GetDocumentAnalysis
              Resource: '*'

  GetJobsBlocksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs-blocks.handler
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsBlocksApi:
          Type: Api
          Properties:
            Path: /jobs/{id}/blocks
            Method: get
      Policies:
        - AWSLambdaBasicExecutionRole

  PostJobsExtractFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-extract.handler
      Runtime: nodejs20.x
      Timeout: 300
      Layers:
        - !Ref DbLayer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
      Events:
        PostJobsExtract:
          Type: Api
          Properties:
            Path: /jobs/{id}/extract
            Method: post
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Sub '{{resolve:ssm:/${Stage}/demand-letter/bedrock-model-id}}'

  GetJobsGapReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: get-jobs-gap-report.handler
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref DbLayer
      Events:
        GetJobsGapReport:
          Type: Api
          Properties:
            Path: /jobs/{id}/gap-report
            Method: get
      Policies:
        - AWSLambdaBasicExecutionRole

  PostJobsAttorneyJudgmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/handlers/
      Handler: post-jobs-attorney-judgment.handler
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref DbLayer
      Events:
        PostJobsAttorneyJudgment:
          Type: Api
          Properties:
            Path: /jobs/{id}/attorney-judgment
            Method: post
      Policies:
        - AWSLambdaBasicExecutionRole

Outputs:
  DbInstanceEndpoint:
    Value: !GetAtt DemandLetterDb.Endpoint.Address
    Export:
      Name: !Sub '${Stage}-demand-letter-db-endpoint'

  DbInstancePort:
    Value: !GetAtt DemandLetterDb.Endpoint.Port
    Export:
      Name: !Sub '${Stage}-demand-letter-db-port'

  KmsKeyArn:
    Value: !GetAtt DemandLetterKmsKey.Arn
    Export:
      Name: !Sub '${Stage}-demand-letter-kms-key-arn'

  DocumentsBucketName:
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub '${Stage}-demand-letter-docs-bucket'

  DocumentsBucketArn:
    Value: !GetAtt DocumentsBucket.Arn
    Export:
      Name: !Sub '${Stage}-demand-letter-docs-bucket-arn'
