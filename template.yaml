        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt DocumentsBucket.Arn
                - !Sub '${DocumentsBucket.Arn}/*'
            - Effect: Allow
              Action:
                - textract:StartDocumentAnalysis
              Resource: '*'
      Environment:
