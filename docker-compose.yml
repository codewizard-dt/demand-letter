services:
  postgres:
    image: postgres:16-alpine
    container_name: demand-letter-postgres
    environment:
      POSTGRES_DB: demand_letter_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5430:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - demand-letter-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demand_letter_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:

networks:
  demand-letter-dev:
    name: demand-letter-dev
