version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.0.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @demand-letter/web exec vite build
  artifacts:
    baseDirectory: app/frontend/dist
    files:
      - '**/*'
