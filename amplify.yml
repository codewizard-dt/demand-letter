version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.0.0 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @demand-letter/web build
  artifacts:
    baseDirectory: app/frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/.pnpm/**/*
      - app/frontend/node_modules/**/*
