- id: "gs-008"
  description: "Claim number embedded in a Re: line is classified as variable_populated with field claim_number"
  query: |
    Zone 1: "Re: Claim No. [CLAIM NUMBER] / [INSURED NAME]"
  tested_files:
    - app/server/src/lib/zone-classifier.ts
    - app/server/src/lib/zone-field-schema.ts
  expected_tools:
    - invokeModel
  must_contain:
    - '"type": "variable_populated"'
    - '"suggestedFieldName": "claim_number"'
  must_not_contain:
    - '"boilerplate_verbatim"'
    - '"suggestedFieldName": "reference_number"'
    - '"suggestedFieldName": "case_number"'
