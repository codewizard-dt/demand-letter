- id: "gs-005"
  description: "A sentence containing a specific dollar figure is boilerplate_verbatim, not a variable zone"
  query: |
    Zone 12: "The total medical specials incurred to date amount to $47,832.00."
  tested_files:
    - packages/api/src/lib/zone-classifier.ts
  expected_tools:
    - invokeModel
  must_contain:
    - '"type": "boilerplate_verbatim"'
    - '"suggestedFieldName": null'
  must_not_contain:
    - '"variable_populated"'
    - '"total_medical_specials"'
