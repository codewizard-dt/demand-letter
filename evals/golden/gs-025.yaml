- id: "gs-025"
  description: "buildDataObject() parses per_provider_line_items JSON into an array at 'specials' key"
  query: |
    Input: extractedFields = [{ fieldName: 'per_provider_line_items',
    value: '[{"provider":"Valley ER","amount":"$4,200"}]',
    isNull: false, acceptMissing: false }]
    Call: buildDataObject(jobId)
    Expected: result['specials'] is an array with one object —
    NOT a raw JSON string. The tagName 'specials' is used (not 'perProviderLineItems'
    or 'per_provider_line_items').
  tested_files:
    - app/server/src/lib/generation-data-builder.ts
    - app/server/src/lib/field-schema.ts
  expected_tools:
    - buildDataObject
  must_contain:
    - '"specials"'
    - '"provider"'
    - '"amount"'
  # buildDataObject aliases the parsed array under BOTH the loop tagName (specials)
  # and the dbName (per_provider_line_items) via setValueWithAlias, so the dbName key
  # is expected to be present. We still forbid the wrong camelCase key and the raw
  # unparsed JSON string.
  must_not_contain:
    - '"perProviderLineItems"'
    - '"[{\\"provider\\"'
