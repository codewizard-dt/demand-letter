- id: "gs-042"
  description: "textRunFromNode() applies D9D9D9 gray shading for boilerplateZone mark — zone protection preserved in export"
  query: |
    Call: textRunFromNode({ type: "text", text: "Pursuant to CCP §999...", marks: [{ type: "boilerplateZone" }] })
    Expected: TextRun with shading.fill = 'D9D9D9' (gray background to visually mark read-only zones).
  tested_files:
    - packages/api/src/lib/prosemirror-to-docx.ts
  expected_tools:
    - textRunFromNode
  must_contain:
    - '"fill": "D9D9D9"'
    - '"type": "CLEAR"'
  must_not_contain:
    - '"bold": true'
    - '"shading": undefined'
    - '"fill": "FFFFFF"'
