- id: "gs-052"
  description: "POST /jobs/:id/save-values sets acceptMissing=true for named slots without supplying a value"
  query: |
    POST /jobs/job-1/save-values
    Body: { "fields": [], "acceptMissing": ["return_to_work_date"] }
    Expected: extractedField upserted with acceptMissing: true, isNull: true,
      nullReason: "attorney accepted as missing".
    Returns: { "ok": true }
  tested_files:
    - app/server/src/handlers/post-jobs-save-values.ts
  expected_tools:
    - post-jobs-save-values
  must_contain:
    - '"ok": true'
    - '"acceptMissing": true'
    - '"attorney accepted as missing"'
  must_not_contain:
    - '"statusCode": 400'
    - '"statusCode": 500'
    - '"acceptMissing": false'
