- id: "gs-017"
  description: "detectDocumentType() returns 'pdf-scanned' for a PDF with no extractable text layer"
  query: |
    Call: detectDocumentType(buffer, "police_report.pdf")
    where buffer is a valid PDF with an empty text layer (pdf-parse returns text: "")
  tested_files:
    - app/server/src/lib/document-type-detector.ts
  expected_tools:
    - detectDocumentType
  must_contain:
    - '"pdf-scanned"'
  must_not_contain:
    - '"pdf-native"'
    - '"docx"'
    - "Unsupported file type"
