- id: "gs-049"
  description: "GET /jobs/:id/changes returns collaborative change log with operationType and contentDelta fields"
  query: |
    DB state:
      collaborativeChange rows: [
        { id: "c1", jobId: "job-1", userId: "user-a", userName: "Alice", operationType: "insert", contentDelta: "pain and suffering" },
        { id: "c2", jobId: "job-1", userId: "user-b", userName: "Bob", operationType: "delete", contentDelta: "unnecessary text" }
      ]
    GET /jobs/job-1/changes
    Expected: { changes: [{ id, userId, userName, operationType, contentDelta, createdAt }, ...] }
  tested_files:
    - packages/api/src/handlers/get-jobs-changes.ts
  expected_tools:
    - get-jobs-changes
  must_contain:
    - '"changes"'
    - '"operationType"'
    - '"contentDelta"'
    - '"userName"'
  must_not_contain:
    - '"statusCode": 500'
    - '"error"'
