- id: "gs-041"
  description: "textRunFromNode() produces a TextRun with bold=true when the node has a 'bold' mark"
  query: |
    Call: textRunFromNode({ type: "text", text: "Important claim", marks: [{ type: "bold" }] })
    Expected: TextRun with bold: true (not undefined, not omitted).
  tested_files:
    - app/server/src/lib/prosemirror-to-docx.ts
  expected_tools:
    - textRunFromNode
  must_contain:
    - '"bold": true'
    - '"text": "Important claim"'
  must_not_contain:
    - '"bold": false'
    - '"bold": undefined'
    - '"italics": true'
