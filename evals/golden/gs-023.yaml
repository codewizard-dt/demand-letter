- id: "gs-023"
  description: "buildDataObject() maps snake_case dbName to camelCase tagName key in the result object"
  query: |
    Input: extractedFields = [{ fieldName: 'claimant_name', value: 'Jane Smith',
    isNull: false, acceptMissing: false }]
    Call: buildDataObject(jobId)
    Expected: result contains key 'claimantName' with value 'Jane Smith' —
    not the raw db key 'claimant_name'
  tested_files:
    - app/server/src/lib/generation-data-builder.ts
    - app/server/src/lib/field-schema.ts
  expected_tools:
    - buildDataObject
    - dbNameToTagName
  must_contain:
    - '"claimantName"'
    - '"Jane Smith"'
  # buildDataObject intentionally aliases the value under BOTH the camelCase tag
  # (claimantName) and the snake_case dbName (claimant_name) via setValueWithAlias,
  # so a template may reference either naming. We assert the camelCase mapping
  # exists; we no longer forbid the deliberate dbName alias.
  must_not_contain:
    - "undefined"
