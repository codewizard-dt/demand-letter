- id: "gs-043"
  description: "GET /jobs/:id/export/docx returns 422 with output_not_ready when job exists but has no generated output"
  query: |
    DB state: job row { id: "job-x", output: null }
    GET /jobs/job-x/export/docx
    Expected: 422 with error: "output_not_ready" — cannot export a DOCX before generation runs.
  tested_files:
    - packages/api/src/handlers/get-jobs-export-docx.ts
  expected_tools:
    - get-jobs-export-docx
  must_contain:
    - '"output_not_ready"'
    - '"statusCode": 422'
  must_not_contain:
    - '"statusCode": 200'
    - '"statusCode": 500'
    - '"isBase64Encoded"'
