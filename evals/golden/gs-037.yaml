- id: "gs-037"
  description: "estimateCostUsd() applies Opus-tier pricing for Opus 4.x models (higher rate than Sonnet)"
  query: |
    Call: estimateCostUsd('anthropic.claude-opus-4-8', 1_000_000, 1_000_000)
    MODEL_PRICING for Opus 4.x: inputPerMTok $5.00, outputPerMTok $25.00
    Expected: (1_000_000 / 1_000_000) × $5.00 + (1_000_000 / 1_000_000) × $25.00 = 30.0
  tested_files:
    - app/server/src/lib/ai.ts
  expected_tools:
    - estimateCostUsd
  must_contain:
    - "30"
  # NOTE: "0" was removed as a must_not_contain — it is unsatisfiable, since the
  # correct result "30" necessarily contains the character "0". The meaningful
  # negatives are "3." (wrong magnitude, e.g. 3.0) and "NaN" (arithmetic error).
  must_not_contain:
    - "3."
    - "NaN"
