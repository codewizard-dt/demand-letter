- id: "gs-028"
  description: "redactText() replaces a PATIENT span with [PATIENT_NAME] token without shifting adjacent text"
  query: |
    Input: text = "Patient John Doe was admitted on 01/15/2024."
    entities = [{ type: "PATIENT", startOffset: 8, endOffset: 16 }]
    Call: redactText(text, entities)
    Expected: "Patient [PATIENT_NAME] was admitted on 01/15/2024."
    The prefix ("Patient ") and suffix (" was admitted...") must be preserved exactly.
  tested_files:
    - app/server/src/lib/redact-text.ts
  expected_tools:
    - redactText
  must_contain:
    - "[PATIENT_NAME]"
    - "was admitted on 01/15/2024"
    - "Patient "
  must_not_contain:
    - "John Doe"
    - "John"
    - "Doe"
    - "[PHI_ENTITY]"
